<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="../../assets/images/logo.ico">
<title>仓储管理 - 小麦科技企业管理平台</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <div class="layout">
    <div id="sidebar-placeholder"></div>
    <main class="main-content">
      <div class="page-header">
        <div>
          <div class="page-title">仓储管理</div>
          <div class="page-subtitle">仓储全流程管理</div>
        </div>
        <button class="btn btn-primary" id="add-btn">+ 新增库存</button>
      </div>

      <div class="stats-grid" id="stats-grid"></div>

      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(360px,1fr));gap:var(--spacing-lg);margin-top:var(--spacing-lg)">
        <div class="card">
          <div class="card-header"><div class="card-title">库存分类分布</div></div>
          <div style="height:260px;padding:16px"><canvas id="category-chart"></canvas></div>
        </div>
        <div class="card">
          <div class="card-header"><div class="card-title">库存状态概览</div></div>
          <div style="height:260px;padding:16px"><canvas id="stock-status-chart"></canvas></div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:var(--spacing-md);margin-top:var(--spacing-lg)">
        <a href="operation.html" class="stat-card" style="text-decoration:none">
          <div class="stat-icon"><i class="ti ti-package"></i></div>
          <div class="stat-info"><div class="stat-value" style="font-size:var(--font-size-lg)">基本操作</div><div class="stat-label">出入库操作记录</div></div>
        </a>
        <a href="layout.html" class="stat-card" style="text-decoration:none">
          <div class="stat-icon"><i class="ti ti-map"></i></div>
          <div class="stat-info"><div class="stat-value" style="font-size:var(--font-size-lg)">货位管理</div><div class="stat-label">仓库货位与容量</div></div>
        </a>
        <a href="warning.html" class="stat-card" style="text-decoration:none">
          <div class="stat-icon"><i class="ti ti-alert-triangle"></i></div>
          <div class="stat-info"><div class="stat-value" style="font-size:var(--font-size-lg)">库存预警</div><div class="stat-label">库存不足提醒</div></div>
        </a>
        <a href="transport.html" class="stat-card" style="text-decoration:none">
          <div class="stat-icon"><i class="ti ti-truck"></i></div>
          <div class="stat-info"><div class="stat-value" style="font-size:var(--font-size-lg)">运输跟踪</div><div class="stat-label">出库运输状态</div></div>
        </a>
      </div>

      <!-- 库存概览 -->
      <div class="card" style="margin-top:var(--spacing-lg)">
        <div class="card-header">
          <div class="card-title">库存概览</div>
          <div class="toolbar-right">
            <div class="search-box">
              <span class="search-icon"><i class="ti ti-search"></i></span>
              <input type="text" id="search-input" placeholder="搜索物品名称/分类">
            </div>
            <a href="warning.html" class="btn btn-ghost btn-sm">查看预警</a>
          </div>
        </div>
        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr><th>编号</th><th>物品名称</th><th>分类</th><th>货位</th><th>当前库存</th><th>最低库存</th><th>状态</th><th>操作</th></tr>
            </thead>
            <tbody id="inventory-tbody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- 新增/编辑库存弹窗 -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modal-title">新增库存</div>
        <div class="modal-close" id="modal-close">✕</div>
      </div>
      <div class="modal-body">
        <form id="inventory-form">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label required">物品名称</label>
              <input class="form-control" id="f-name" placeholder="请输入物品名称">
            </div>
            <div class="form-group">
              <label class="form-label">分类</label>
              <select class="form-control" id="f-category">
                <option value="成品">成品</option>
                <option value="原材料">原材料</option>
                <option value="零部件">零部件</option>
                <option value="辅材">辅材</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">规格</label>
              <input class="form-control" id="f-spec" placeholder="请输入规格">
            </div>
            <div class="form-group">
              <label class="form-label">单位</label>
              <input class="form-control" id="f-unit" placeholder="件/吨/个" value="件">
            </div>
            <div class="form-group">
              <label class="form-label">当前库存</label>
              <input class="form-control" type="number" id="f-stock" placeholder="请输入库存数量">
            </div>
            <div class="form-group">
              <label class="form-label">最低库存</label>
              <input class="form-control" type="number" id="f-minStock" placeholder="请输入最低库存">
            </div>
            <div class="form-group">
              <label class="form-label">货位</label>
              <input class="form-control" id="f-location" placeholder="如 A-01-01">
            </div>
          </div>
          <div class="form-error" id="form-error"></div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="modal-cancel">取消</button>
        <button class="btn btn-primary" id="modal-save">保存</button>
      </div>
    </div>
  </div>

<script src="../../assets/js/main.js"></script>
</body>
</html>
