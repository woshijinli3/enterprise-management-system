<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="../../assets/images/logo.ico">
<title>基本操作 - 小麦科技企业管理平台</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <div class="layout">
    <div id="sidebar-placeholder"></div>
    <main class="main-content">
      <div class="page-header">
        <div>
          <div class="page-title">基本操作</div>
          <div class="page-subtitle">出入库操作记录</div>
        </div>
        <div class="toolbar-inline">
          <button class="btn btn-primary" id="add-inbound-btn">+ 入库登记</button>
          <button class="btn btn-outline" id="add-outbound-btn">+ 出库登记</button>
        </div>
      </div>

      <div class="stats-grid" id="stats-grid"></div>

      <!-- 入库记录 -->
      <div class="card">
        <div class="card-header">
          <div class="card-title"><i class="ti ti-inbox"></i> 入库记录</div>
          <div class="toolbar-right">
            <div class="search-box">
              <span class="search-icon"><i class="ti ti-search"></i></span>
              <input type="text" id="search-input" placeholder="搜索物品/来源/去向">
            </div>
          </div>
        </div>
        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr><th>单号</th><th>物品</th><th>数量</th><th>来源</th><th>入库日期</th><th>操作员</th></tr>
            </thead>
            <tbody id="inbound-tbody"></tbody>
          </table>
        </div>
      </div>

      <!-- 出库记录 -->
      <div class="card u-mt-lg">
        <div class="card-header"><div class="card-title"><i class="ti ti-transfer-out"></i> 出库记录</div></div>
        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr><th>单号</th><th>物品</th><th>数量</th><th>去向</th><th>出库日期</th><th>操作员</th></tr>
            </thead>
            <tbody id="outbound-tbody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- 入库弹窗 -->
  <div class="modal-overlay" id="inbound-modal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">入库登记</div>
        <div class="modal-close" id="inbound-close">✕</div>
      </div>
      <div class="modal-body">
        <form id="inbound-form">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label required">物品名称</label>
              <input class="form-control" id="ib-item" placeholder="请输入物品名称">
            </div>
            <div class="form-group">
              <label class="form-label">数量</label>
              <input class="form-control" type="number" id="ib-quantity" placeholder="请输入数量">
            </div>
            <div class="form-group">
              <label class="form-label">单位</label>
              <input class="form-control" id="ib-unit" placeholder="件/吨/个" value="件">
            </div>
            <div class="form-group">
              <label class="form-label">供应商/来源</label>
              <input class="form-control" id="ib-supplier" placeholder="请输入来源">
            </div>
            <div class="form-group">
              <label class="form-label">入库日期</label>
              <input class="form-control" type="date" id="ib-date">
            </div>
            <div class="form-group">
              <label class="form-label">操作员</label>
              <input class="form-control" id="ib-operator" placeholder="请输入操作员" value="仓管员小张">
            </div>
          </div>
          <div class="form-error" id="ib-error"></div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="inbound-cancel">取消</button>
        <button class="btn btn-primary" id="inbound-save">确认入库</button>
      </div>
    </div>
  </div>

  <!-- 出库弹窗 -->
  <div class="modal-overlay" id="outbound-modal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">出库登记</div>
        <div class="modal-close" id="outbound-close">✕</div>
      </div>
      <div class="modal-body">
        <form id="outbound-form">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label required">物品名称</label>
              <input class="form-control" id="ob-item" placeholder="请输入物品名称">
            </div>
            <div class="form-group">
              <label class="form-label">数量</label>
              <input class="form-control" type="number" id="ob-quantity" placeholder="请输入数量">
            </div>
            <div class="form-group">
              <label class="form-label">单位</label>
              <input class="form-control" id="ob-unit" placeholder="件/吨/个" value="件">
            </div>
            <div class="form-group">
              <label class="form-label">去向/客户</label>
              <input class="form-control" id="ob-customer" placeholder="请输入去向">
            </div>
            <div class="form-group">
              <label class="form-label">出库日期</label>
              <input class="form-control" type="date" id="ob-date">
            </div>
            <div class="form-group">
              <label class="form-label">操作员</label>
              <input class="form-control" id="ob-operator" placeholder="请输入操作员" value="仓管员小李">
            </div>
          </div>
          <div class="form-error" id="ob-error"></div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="outbound-cancel">取消</button>
        <button class="btn btn-primary" id="outbound-save">确认出库</button>
      </div>
    </div>
  </div>

<script src="../../assets/js/main.js"></script>
</body>
</html>
