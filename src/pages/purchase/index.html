<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="../../assets/images/logo.ico">
<title>采购管理 - 小麦科技企业管理平台</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <div class="layout">
    <div id="sidebar-placeholder"></div>
    <main class="main-content">
      <div class="page-header">
        <div>
          <div class="page-title">采购管理</div>
          <div class="page-subtitle">采购全流程管理</div>
        </div>
      </div>

      <div class="stats-grid" id="stats-grid"></div>

      <div class="module-entry-grid">
        <a href="supplier.html" class="stat-card stat-card--link">
          <div class="stat-icon"><i class="ti ti-heart-handshake"></i></div>
          <div class="stat-info"><div class="stat-value stat-value--section">供应商信息</div><div class="stat-label">供应商档案与评价</div></div>
        </a>
        <a href="process.html" class="stat-card stat-card--link">
          <div class="stat-icon"><i class="ti ti-clipboard-list"></i></div>
          <div class="stat-info"><div class="stat-value stat-value--section">采购流程</div><div class="stat-label">采购订单管理</div></div>
        </a>
        <a href="tracking.html" class="stat-card stat-card--link">
          <div class="stat-icon"><i class="ti ti-truck"></i></div>
          <div class="stat-info"><div class="stat-value stat-value--section">订单跟踪</div><div class="stat-label">采购订单状态跟踪</div></div>
        </a>
        <a href="analysis.html" class="stat-card stat-card--link">
          <div class="stat-icon"><i class="ti ti-chart-bar"></i></div>
          <div class="stat-info"><div class="stat-value stat-value--section">数据分析</div><div class="stat-label">采购数据统计分析</div></div>
        </a>
      </div>

      <!-- 近期采购订单 -->
      <div class="card u-mt-lg">
        <div class="card-header">
          <div class="card-title">近期采购订单</div>
          <a href="process.html" class="btn btn-ghost btn-sm">查看全部</a>
        </div>
        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr><th>订单号</th><th>供应商</th><th>采购项目</th><th>金额</th><th>交货日期</th><th>状态</th></tr>
            </thead>
            <tbody id="order-tbody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
<script src="../../assets/js/main.js"></script>
</body>
</html>
