<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="../../assets/images/logo.ico">
<title>绩效评估 - 小麦科技企业管理平台</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <div class="layout">
    <div id="sidebar-placeholder"></div>
    <main class="main-content">
      <div class="page-header">
        <div>
          <div class="page-title">绩效评估</div>
          <div class="page-subtitle">2026年 Q1 绩效考核结果</div>
        </div>
        <button class="btn btn-primary" id="add-btn">+ 新增绩效</button>
      </div>

      <div class="stats-grid" id="stats-grid"></div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">绩效列表</div>
          <div class="toolbar-right">
            <div class="search-box">
              <span class="search-icon"><i class="ti ti-search"></i></span>
              <input type="text" id="search-input" placeholder="搜索工号/姓名/部门">
            </div>
          </div>
        </div>
        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr>
                <th>工号</th><th>姓名</th><th>部门</th><th>考核周期</th>
                <th>得分</th><th>等级</th><th>评语</th><th>操作</th>
              </tr>
            </thead>
            <tbody id="perf-tbody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
<!-- 新增/编辑绩效弹窗 -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modal-title">新增绩效</div>
        <div class="modal-close" id="modal-close">✕</div>
      </div>
      <div class="modal-body">
        <form id="performance-form">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label required">工号</label>
              <input class="form-control" id="f-empId" placeholder="如 E001">
            </div>
            <div class="form-group">
              <label class="form-label required">姓名</label>
              <input class="form-control" id="f-empName" placeholder="请输入姓名">
            </div>
            <div class="form-group">
              <label class="form-label">部门</label>
              <input class="form-control" id="f-dept" placeholder="请输入部门">
            </div>
            <div class="form-group">
              <label class="form-label">考核周期</label>
              <input class="form-control" id="f-period" placeholder="如 2026-Q1">
            </div>
            <div class="form-group">
              <label class="form-label">得分</label>
              <input class="form-control" type="number" id="f-score" placeholder="0-100">
            </div>
            <div class="form-group">
              <label class="form-label">等级</label>
              <select class="form-control" id="f-grade">
                <option value="A">A</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B" selected>B</option>
                <option value="B-">B-</option>
                <option value="C">C</option>
                <option value="D">D</option>
              </select>
            </div>
            <div class="form-group form-group--wide">
              <label class="form-label">评语</label>
              <input class="form-control" id="f-comment" placeholder="请输入评语">
            </div>
          </div>
          <div class="form-error" id="form-error"></div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="modal-cancel">取消</button>
        <button class="btn btn-primary" id="modal-save">保存</button>
      </div>
    </div>
  </div>

<script src="../../assets/js/main.js"></script>
</body>
</html>
