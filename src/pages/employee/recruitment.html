<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="../../assets/images/logo.ico">
<title>招聘培训 - 小麦科技企业管理平台</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <div class="layout">
    <div id="sidebar-placeholder"></div>
    <main class="main-content">
      <div class="page-header">
        <div>
          <div class="page-title">招聘培训</div>
          <div class="page-subtitle">招聘计划管理</div>
        </div>
        <button class="btn btn-primary" id="add-btn">+ 发布职位</button>
      </div>

      <div class="stats-grid" id="stats-grid"></div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">招聘计划</div>
        </div>
        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr>
                <th>编号</th><th>职位</th><th>部门</th><th>招聘人数</th>
                <th>发布日期</th><th>截止日期</th><th>投递人数</th><th>状态</th><th>操作</th>
              </tr>
            </thead>
            <tbody id="recruit-tbody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
<!-- 新增/编辑招聘计划弹窗 -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modal-title">发布职位</div>
        <div class="modal-close" id="modal-close">✕</div>
      </div>
      <div class="modal-body">
        <form id="recruitment-form">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label required">职位名称</label>
              <input class="form-control" id="f-position" placeholder="请输入职位名称">
            </div>
            <div class="form-group">
              <label class="form-label">所属部门</label>
              <input class="form-control" id="f-dept" placeholder="请输入部门" value="人事部">
            </div>
            <div class="form-group">
              <label class="form-label">招聘人数</label>
              <input class="form-control" type="number" id="f-headcount" value="1">
            </div>
            <div class="form-group">
              <label class="form-label">状态</label>
              <select class="form-control" id="f-status">
                <option value="待发布">待发布</option>
                <option value="招聘中" selected>招聘中</option>
                <option value="已完成">已完成</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">发布日期</label>
              <input class="form-control" type="date" id="f-publishDate">
            </div>
            <div class="form-group">
              <label class="form-label">截止日期</label>
              <input class="form-control" type="date" id="f-deadline">
            </div>
          </div>
          <div class="form-error" id="form-error"></div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="modal-cancel">取消</button>
        <button class="btn btn-primary" id="modal-save">保存</button>
      </div>
    </div>
  </div>

<script src="../../assets/js/main.js"></script>
</body>
</html>
