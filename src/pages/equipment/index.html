<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="../../assets/images/logo.ico">
<title>设备管理 - 小麦科技企业管理平台</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <div class="layout">
    <div id="sidebar-placeholder"></div>
    <main class="main-content">
      <div class="page-header">
        <div>
          <div class="page-title">设备管理</div>
          <div class="page-subtitle">设备全生命周期管理</div>
        </div>
      </div>

      <div class="stats-grid" id="stats-grid"></div>

      <div class="module-entry-grid">
        <a href="monitor.html" class="stat-card stat-card--link">
          <div class="stat-icon"><i class="ti ti-radar"></i></div>
          <div class="stat-info"><div class="stat-value stat-value--section">状态监控</div><div class="stat-label">实时设备运行状态</div></div>
        </a>
        <a href="maintenance.html" class="stat-card stat-card--link">
          <div class="stat-icon"><i class="ti ti-tool"></i></div>
          <div class="stat-info"><div class="stat-value stat-value--section">维护计划</div><div class="stat-label">设备维护计划管理</div></div>
        </a>
        <a href="fault.html" class="stat-card stat-card--link">
          <div class="stat-icon"><i class="ti ti-alert-triangle"></i></div>
          <div class="stat-info"><div class="stat-value stat-value--section">故障记录</div><div class="stat-label">故障记录与分析</div></div>
        </a>
        <a href="info.html" class="stat-card stat-card--link">
          <div class="stat-icon"><i class="ti ti-clipboard-list"></i></div>
          <div class="stat-info"><div class="stat-value stat-value--section">设备信息</div><div class="stat-label">设备档案管理</div></div>
        </a>
      </div>

      <div class="card u-mt-lg">
        <div class="card-header">
          <div class="card-title">设备状态总览</div>
        </div>
        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr><th>设备编号</th><th>设备名称</th><th>型号</th><th>位置</th><th>下次维护</th><th>状态</th></tr>
            </thead>
            <tbody id="equip-tbody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
<script src="../../assets/js/main.js"></script>
</body>
</html>
